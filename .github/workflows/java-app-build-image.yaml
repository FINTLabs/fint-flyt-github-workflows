name: Java App Build Image

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version to use for the Gradle build.
        required: false
        type: string
        default: "25"
      build-command:
        description: Gradle command used to build the application.
        required: false
        type: string
        default: ./gradlew build
      push-image:
        description: Whether to push the image to GHCR.
        required: false
        type: boolean
        default: false
    outputs:
      image-ref:
        description: Full GHCR image reference built by this workflow.
        value: ${{ jobs.build.outputs.image-ref }}

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.image-ref }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Build with Gradle
        run: ${{ inputs.build-command }}

      - name: Derive image reference
        id: image
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image_ref="${REGISTRY}/${image_name}:${GITHUB_SHA}"
          echo "image-name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image-ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: inputs.push-image
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ inputs.push-image }}
          tags: ${{ steps.image.outputs.image-ref }}