name: Java App Deploy AKS

on:
  workflow_call:
    inputs:
      org:
        description: Kubernetes namespace/organisation to deploy to.
        required: true
        type: string
      cluster:
        description: AKS cluster name.
        required: true
        type: string
      image-ref:
        description: Full GHCR image reference to deploy.
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy ${{ inputs.org }} to ${{ inputs.cluster }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.cluster }}-${{ inputs.org }}
      cancel-in-progress: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Determine environment
        id: environment
        uses: actions/github-script@v9
        with:
          script: return '${{ inputs.cluster }}'.split('-')[1];
          result-encoding: string

      - name: Determine resource group
        id: resource-group
        uses: actions/github-script@v9
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}';
          result-encoding: string

      - name: Validate overlay path
        run: |
          overlay_path="kustomize/overlays/${{ inputs.org }}/${{ steps.environment.outputs.result }}"
          test -d "${overlay_path}"

      - name: Bake manifests
        id: bake
        uses: azure/k8s-bake@v4
        with:
          renderEngine: kustomize
          kustomizationPath: kustomize/overlays/${{ inputs.org }}/${{ steps.environment.outputs.result }}

      - name: Substitute image into baked YAML
        id: substitute
        shell: bash
        env:
          IMAGE_REF: ${{ inputs.image-ref }}
          MANIFESTS: ${{ steps.bake.outputs.manifestsBundle }}
        run: |
          image_name="${IMAGE_REF%:*}"
          substituted_manifests="${RUNNER_TEMP}/manifests-substituted"
          mkdir -p "${substituted_manifests}"

          while IFS= read -r manifest; do
            [ -n "${manifest}" ] || continue

            if [ -d "${manifest}" ]; then
              cp -R "${manifest}/." "${substituted_manifests}/"
            elif [ -f "${manifest}" ]; then
              cp "${manifest}" "${substituted_manifests}/"
            else
              echo "::error::Manifest path does not exist: ${manifest}"
              exit 1
            fi
          done <<< "${MANIFESTS}"

          export IMAGE_REF image_name
          find "${substituted_manifests}" -type f \( -name '*.yaml' -o -name '*.yml' \) \
            -exec perl -0pi -e 's{\Q$ENV{image_name}\E:[A-Za-z0-9_.-]+}{$ENV{IMAGE_REF}}g' {} +

          if grep -R -q -F "${image_name}:sha-" "${substituted_manifests}"; then
            echo "::error::Image placeholder was not replaced for ${image_name}"
            exit 1
          fi

          echo "manifests=${substituted_manifests}" >> "${GITHUB_OUTPUT}"

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets[format('AKS_{0}_FINT_GITHUB', steps.environment.outputs.result)] }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ steps.resource-group.outputs.result }}
          admin: true

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v6
        with:
          action: deploy
          manifests: ${{ steps.substitute.outputs.manifests }}
          images: ${{ inputs.image-ref }}
          namespace: ${{ inputs.org }}
          pull-images: false
