name: Java App Deploy AKS

on:
  workflow_call:
    inputs:
      org:
        description: Kubernetes namespace/organisation to deploy to.
        required: true
        type: string
      cluster:
        description: AKS cluster name.
        required: true
        type: string
      image-ref:
        description: Full GHCR image reference to deploy.
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy ${{ inputs.org }} to ${{ inputs.cluster }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.cluster }}-${{ inputs.org }}
      cancel-in-progress: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Determine environment
        id: environment
        uses: actions/github-script@v9
        with:
          script: return '${{ inputs.cluster }}'.split('-')[1];
          result-encoding: string

      - name: Determine resource group
        id: resource-group
        uses: actions/github-script@v9
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}';
          result-encoding: string

      - name: Validate overlay path
        run: |
          overlay_path="kustomize/overlays/${{ inputs.org }}/${{ steps.environment.outputs.result }}"
          test -d "${overlay_path}"

      - name: Bake manifests
        id: bake
        uses: azure/k8s-bake@v4.1.0
        with:
          renderEngine: kustomize
          kustomizationPath: kustomize/overlays/${{ inputs.org }}/${{ steps.environment.outputs.result }}

      - name: Substitute image into baked YAML
        id: substitute
        uses: azure/k8s-artifact-substitute@v2.0.0
        with:
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          images: ${{ inputs.image-ref }}

      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets[format('AKS_{0}_FINT_GITHUB', steps.environment.outputs.result)] }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5.0.0
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ steps.resource-group.outputs.result }}
          admin: true
          use-kubelogin: true

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v6.0.0
        with:
          action: deploy
          manifests: ${{ steps.substitute.outputs.manifests }}
          images: ${{ inputs.image-ref }}
          namespace: ${{ inputs.org }}
          pull-images: false
