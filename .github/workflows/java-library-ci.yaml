name: Java Library CI

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version to use for the Gradle build.
        required: false
        type: string
        default: "25"
      gradle-command:
        description: Gradle command used to validate the library.
        required: false
        type: string
        default: ./gradlew build

permissions:
  contents: read

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Run Gradle validation
        run: ${{ inputs.gradle-command }}
