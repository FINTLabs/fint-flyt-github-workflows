name: Java Library Publish Reposilite

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version to use for the Gradle publish.
        required: false
        type: string
        default: "25"
      publish-command:
        description: Gradle command used to publish the library.
        required: false
        type: string
        default: ./gradlew clean build publish -Pversion=${RELEASE_VERSION}
    secrets:
      REPOSILITE_USERNAME:
        required: true
      REPOSILITE_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Publish to Reposilite
        run: ${{ inputs.publish-command }}
        env:
          REPOSILITE_USERNAME: ${{ secrets.REPOSILITE_USERNAME }}
          REPOSILITE_PASSWORD: ${{ secrets.REPOSILITE_PASSWORD }}
